databases:
  - name: grading-system-db
    plan: free
    region: singapore
    databaseName: grading_system
    user: grading_user

services:
  - type: web
    name: grading-system-backend
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /v3/api-docs
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grading-system-db
          property: connectionString
      - key: RENDER_PGUSER
        fromDatabase:
          name: grading-system-db
          property: user
      - key: RENDER_PGPASSWORD
        fromDatabase:
          name: grading-system-db
          property: password
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
